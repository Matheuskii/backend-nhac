name: CI/CD

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────
  # 1) BUILD + TESTES + COBERTURA
  # ────────────────────────────────────────────────────────────
  test:
    name: 🧪 Build, testes e cobertura
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    services:
      mariadb:
        image: mariadb:11
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: nhac_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: ☕ Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: 🔍 Validar POM
        run: mvn -B validate

      - name: 🏗️ Compilar
        run: mvn -B -ntp clean compile

      - name: ✅ Rodar testes + gerar cobertura + gate de qualidade
        env:
          DB_URL: jdbc:mariadb://localhost:3306/nhac_db
          DB_USER: root
          DB_PASS: ci_root_password
          JWT_SENHA: ci_test_secret_key_not_for_production
        run: mvn -B -ntp verify

      - name: 📊 Publicar resultado dos testes
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: "target/surefire-reports/TEST-*.xml"
          check_name: "Resultado dos testes"
          fail_on_failure: true
          require_tests: true

      - name: 💬 Comentar cobertura JaCoCo no PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60
          min-coverage-changed-files: 60
          title: "📊 Relatório de Cobertura — backend_nhac"
          update-comment: true

      - name: 📦 Upload relatório JaCoCo (HTML)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: 📦 Upload relatório de testes (Surefire)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: 📦 Upload JAR
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # 2) ANÁLISE DE SEGURANÇA — DEPENDÊNCIAS
  # ────────────────────────────────────────────────────────────
  security-deps:
    name: 🔒 Scan de dependências (OWASP)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: ☕ Configurar JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: 🔍 Trivy — scan do filesystem (deps Maven)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: 📤 Upload resultado do Trivy (SARIF)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-dependencies

  # ────────────────────────────────────────────────────────────
  # 3) BUILD & PUBLISH DA IMAGEM DOCKER
  # ────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Build & Publish Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🏷️ Gerar metadata/tags da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=${{ github.run_number }}

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Build & Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────
  # 4) SCAN DE VULNERABILIDADES NA IMAGEM
  # ────────────────────────────────────────────────────────────
  security-image:
    name: 🔒 Scan da imagem Docker
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 🔍 Trivy — scan da imagem publicada
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: 📤 Upload resultado do Trivy (SARIF)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

  # ────────────────────────────────────────────────────────────
  # 5) NOTIFICAÇÃO FINAL
  # ────────────────────────────────────────────────────────────
  notify:
    name: 📣 Notificar resultado
    runs-on: ubuntu-latest
    needs: [test, security-deps, docker, security-image]
    if: always() && github.event_name == 'push'
    steps:
      - name: 📣 Notificar no Discord
        if: ${{ vars.DISCORD_WEBHOOK_CONFIGURED == 'true' }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.test.result }}
          title: "CI/CD — backend_nhac"
          description: |
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Autor: ${{ github.actor }}
          color: ${{ needs.test.result == 'success' && '0x57F287' || '0xED4245' }}
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
